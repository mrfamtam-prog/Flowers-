<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers For You 🌸</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Loading Screen -->
<div id="loader">
    <h1>🌸 Loading Flower Garden...</h1>
</div>
    <!-- Background -->
    <div class="background"></div>

    <!-- Title -->
    <h1 class="title">🌸 Tap the Flower 🌸</h1>

    <!-- Flower -->
    <div class="flower-container">
        <img id="flower" src="images/flower1.png" alt="Flower">
    </div>

    <!-- Counter -->
    <p id="message">Flower 1 of 10</p>

    <!-- Nature Music -->
    <audio id="bgMusic" loop autoplay>
        <source src="music/nature.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>
<div id="petals"></div>
<div id="butterflies"></div>
<div id="fireflies"></div>
<div id="hearts"></div>
    <!-- Script -->
    <script src="script.js"></script>

</body>
</html>
